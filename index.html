<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar Shadow Lab</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:10px;
}

canvas{
border:1px solid black;
width:100%;
max-width:700px;
}

input{
width:100%;
padding:6px;
}

button{
padding:10px;
margin-top:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

@media (max-width:700px){
.grid{
grid-template-columns:1fr 1fr;
}
}

</style>

</head>

<body>

<h2>Solar Shadow Lab</h2>

<div class="grid">

<div>
<label>Latitude</label>
<input id="lat" type="number" value="23" step="0.01">
</div>

<div>
<label>Longitude</label>
<input id="lon" type="number" value="72" step="0.01">
</div>

<div>
<label>Date</label>
<input id="date" type="date">
</div>

<div>
<label>Time</label>
<input id="time" type="time">
</div>

<div>
<label>Gnomon Height (cm)</label>
<input id="height" type="number" value="20">
</div>

</div>

<br>

<button onclick="drawBoard()">Draw Board</button>
<button onclick="plotDaily()">Plot Daily Shadow</button>
<button onclick="plotAnalemma()">Plot Analemma</button>
<button onclick="observationWindow()">Observation Window</button>

<p id="output"></p>

<canvas id="board" width="700" height="500"></canvas>

<script>

let canvas=document.getElementById("board")
let ctx=canvas.getContext("2d")

let scale=10

let boardW=29.7*scale
let boardH=21*scale

let originX
let originY

let gx
let gy

function dayOfYear(date){
let start=new Date(date.getFullYear(),0,0)
return Math.floor((date-start)/(1000*60*60*24))
}

function solarPosition(lat,lon,date,IST){

let N=dayOfYear(date)

let gamma=2*Math.PI/365*(N-1+(IST-12)/24)

let dec=
0.006918
-0.399912*Math.cos(gamma)
+0.070257*Math.sin(gamma)
-0.006758*Math.cos(2*gamma)
+0.000907*Math.sin(2*gamma)

let timeOffset=4*(lon-82.5)

let tst=IST*60+timeOffset

let H=tst/4-180

let h=H*Math.PI/180

let phi=lat*Math.PI/180

let sinAlt=
Math.sin(phi)*Math.sin(dec)+
Math.cos(phi)*Math.cos(dec)*Math.cos(h)

let alt=Math.asin(sinAlt)

let cosAz=
(Math.sin(dec)-Math.sin(alt)*Math.sin(phi))/
(Math.cos(alt)*Math.cos(phi))

let az=Math.acos(cosAz)

if(H>0) az=2*Math.PI-az

return{alt:alt,az:az}
}

function drawBoard(){

ctx.clearRect(0,0,canvas.width,canvas.height)

originX=(canvas.width-boardW)/2
originY=(canvas.height-boardH)/2

ctx.strokeStyle="blue"
ctx.strokeRect(originX,originY,boardW,boardH)

gx=originX+(29.7-14.8)*scale
gy=originY+14*scale

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(gx,gy,5,0,2*Math.PI)
ctx.fill()

}

function plotDaily(){

drawBoard()

let lat=parseFloat(lat.value)
let lon=parseFloat(lon.value)
let height=parseFloat(heightInput.value)

let d=new Date(date.value)

ctx.strokeStyle="green"
ctx.beginPath()

for(let t=6*60;t<=18*60;t+=5){

let IST=t/60

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0)continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=gx+x*scale
let py=gy-y*scale

if(px>originX && px<originX+boardW && py>originY && py<originY+boardH){

ctx.lineTo(px,py)

}

}

ctx.stroke()

}

function plotAnalemma(){

drawBoard()

let lat=parseFloat(lat.value)
let lon=parseFloat(lon.value)
let height=parseFloat(heightInput.value)

let t=time.value.split(":")
let IST=parseFloat(t[0])+parseFloat(t[1])/60

ctx.fillStyle="green"

for(let N=1;N<=365;N++){

let d=new Date(2026,0)
d.setDate(N)

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0)continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=gx+x*scale
let py=gy-y*scale

if(px>originX && px<originX+boardW && py>originY && py<originY+boardH){

ctx.beginPath()
ctx.arc(px,py,2,0,2*Math.PI)
ctx.fill()

}

}

}

function observationWindow(){

let lat=parseFloat(latInput.value)
let lon=parseFloat(lonInput.value)
let height=parseFloat(heightInput.value)

let d=new Date(dateInput.value)

let start=null
let end=null

for(let t=6*60;t<=18*60;t++){

let IST=t/60

let pos=solarPosition(lat,lon,d,IST)

if(pos.alt<=0)continue

let L=height/Math.tan(pos.alt)

let saz=pos.az+Math.PI

let x=L*Math.sin(saz)
let y=L*Math.cos(saz)

let px=gx+x*scale
let py=gy-y*scale

if(px>originX && px<originX+boardW && py>originY && py<originY+boardH){

if(start===null)start=t
end=t

}

}

if(start===null){
output.innerText="Shadow never fully inside board."
return
}

let sh=Math.floor(start/60)
let sm=start%60

let eh=Math.floor(end/60)
let em=end%60

output.innerText="Observation Window: "+sh+":"+String(sm).padStart(2,"0")+" → "+eh+":"+String(em).padStart(2,"0")

}

let latInput=document.getElementById("lat")
let lonInput=document.getElementById("lon")
let dateInput=document.getElementById("date")
let timeInput=document.getElementById("time")
let heightInput=document.getElementById("height")
let output=document.getElementById("output")

drawBoard()

</script>

</body>
</html>
